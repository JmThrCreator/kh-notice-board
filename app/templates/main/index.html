{% extends "base.html" %}

{% block style %}

<style>
    .wrapper{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        justify-items: center;
        gap: 20px;
        margin: 60px 100px 40px 100px;
        padding: 60px 60px 60px 60px;

        border-radius:10px;
        background-color: rgba(255, 255, 255, 0.3);

        box-shadow: 0px 0px 2px rgba(0,0,0,0.1);
    }
    .wrapper button {
        position: relative;
        width: 250px;
        height: 156px;
        border-radius: 10px;

        background-color: #ffffff;
        border: none;

        cursor: pointer;
        border: 1px solid #dfdfdf;

        box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
        border: 1px solid rgb(203, 203, 203);
    }
    button h3{
        position: relative;
        text-align: left;
        top:30px;
        left:20px;
        font-size:20px;
    }
</style>

{% endblock %}



{% block content %}

<form action="/" method="post">
    
    <div class="header">
        <h1>Notice Board</h1>
        <div class="buttons">
            <button type="submit" name="reset" onclick="disableButton()"><i class="bi bi-arrow-repeat"></i></button>
        </div>
    </div>
    
    <div class="wrapper">
    {% for folder in folders %}
        <button type="submit" name="{{folder}}"><h3>{{folder}}</h3></button>
    {% endfor %}
    </div>  
</form>

{% endblock %}
