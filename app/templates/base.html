<!DOCTYPE html>
<html lang="en">
	<head>
        <title>Notice Board</title>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
		<link rel="stylesheet" href="/static/css/globals.css">
		<link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
	</head>

	{% block head %}{% endblock %}

	<style>
		@keyframes loading {
			to {
				transform: rotate(1turn);
			}
		}
	</style>

	{% block style %}{% endblock %}
	
	<body>
		<div class="m-auto max-w-6xl px-10 relative">
			<div class="right-0 mr-20 absolute">
				<div id="spinner" class="fixed hidden">
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" class="w-12 h-12 text-gray-800 cursor-pointer hover:text-black" fill="currentColor">
						<path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clip-rule="evenodd" />
					</svg> 
				</div>
			</div>
		</div>

	    {% block content %}{% endblock %}
	</body>

	<script src="/static/js/loading.js"></script>
    {% block script %}{% endblock %}
</html>
